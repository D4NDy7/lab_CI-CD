name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Build & cache dependencies ───────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install dependencies
        working-directory: app
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Upload installed packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-env
          path: ~/.cache/pip
          retention-days: 1

  # ── Job 2: Lint (Fan-Out) ────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install dev dependencies
        working-directory: app
        run: pip install -r requirements-dev.txt

      - name: Run ruff linter
        working-directory: app
        run: ruff check src/ tests/

  # ── Job 3: Test (Fan-Out) ────────────────────────────────────────────────────
  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install dependencies
        working-directory: app
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest with coverage
        working-directory: app
        run: |
          pytest tests/ -v \
            --junitxml=test-results/junit.xml \
            --cov=src \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=term-missing

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()   # сохраняем даже при падении тестов
        with:
          name: test-results
          path: app/test-results/
          retention-days: 7

  # ── Job 4: Security Scan (Fan-Out) ──────────────────────────────────────────
  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for vulnerabilities
        working-directory: app
        run: pip-audit -r requirements.txt --format=json -o ../security-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: security-report.json
          retention-days: 7

  # ── Job 5: Quality Gate (Fan-In / Diamond) ───────────────────────────────────
  quality-gate:
    name: Quality Gate
    needs: [lint, test, security-scan]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          echo " Lint   — passed"
          echo " Tests  — passed"
          echo " Security scan — passed"
          echo " Quality Gate: GREEN. Ready to build Docker image."

  # ── Job 6: Docker Build & Push ───────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    needs: quality-gate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (SHA tag, NO :latest)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.sha }}
